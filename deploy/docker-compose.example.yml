services:
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    container_name: ${PALWORLD_CONTAINER:-palworld-server}
    restart: unless-stopped
    stop_grace_period: 120s
    env_file:
      - .env
    ports:
      - "${PALWORLD_PORT:-8211}:8211/udp"
      - "${PALWORLD_QUERY_PORT:-27015}:27015/udp"
      - "127.0.0.1:${PALWORLD_RCON_PORT:-25575}:25575/tcp"
      - "127.0.0.1:${PALWORLD_REST_PORT:-8212}:8212/tcp"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PORT: "8211"
      QUERY_PORT: "27015"
      PLAYERS: ${PALWORLD_PLAYERS:-32}
      SERVER_PLAYER_MAX_NUM: ${PALWORLD_PLAYERS:-32}
      SERVER_NAME: ${PALWORLD_SERVER_NAME:-Palworld Dedicated Server}
      SERVER_DESCRIPTION: ${PALWORLD_SERVER_DESCRIPTION:-Managed by Palworld Ops}
      SERVER_PASSWORD: ${PALWORLD_SERVER_PASSWORD:-change-game-password}
      ADMIN_PASSWORD: ${PALWORLD_ADMIN_PASSWORD:-change-admin-password}
      COMMUNITY: ${PALWORLD_COMMUNITY:-false}
      RCON_ENABLED: ${PALWORLD_RCON_ENABLED:-true}
      RCON_PORT: "25575"
      REST_API_ENABLED: ${PALWORLD_REST_API_ENABLED:-false}
      REST_API_PORT: "8212"
      EXP_RATE: ${PALWORLD_EXP_RATE:-1}
      PAL_CAPTURE_RATE: ${PALWORLD_CAPTURE_RATE:-1}
      PAL_SPAWN_NUM_RATE: ${PALWORLD_SPAWN_RATE:-1}
      COLLECTION_DROP_RATE: ${PALWORLD_COLLECTION_DROP_RATE:-1}
      ENEMY_DROP_ITEM_RATE: ${PALWORLD_ENEMY_DROP_RATE:-1}
      PAL_EGG_DEFAULT_HATCHING_TIME: ${PALWORLD_EGG_HATCHING_HOURS:-72}
      AUTO_SAVE_SPAN: ${PALWORLD_AUTO_SAVE_SPAN:-30}
      DEATH_PENALTY: ${PALWORLD_DEATH_PENALTY:-All}
      BASE_CAMP_WORKER_MAX_NUM: ${PALWORLD_BASE_CAMP_WORKER_MAX:-15}
      GUILD_PLAYER_MAX_NUM: ${PALWORLD_GUILD_PLAYER_MAX:-20}
      BASE_CAMP_MAX_NUM_IN_GUILD: ${PALWORLD_BASE_CAMP_MAX_IN_GUILD:-4}
      CROSSPLAY_PLATFORMS: ${PALWORLD_CROSSPLAY_PLATFORMS:-(Steam,Xbox,PS5,Mac)}
      AUTO_PAUSE_ENABLED: ${PALWORLD_AUTO_PAUSE_ENABLED:-false}
      ENABLE_PLAYER_LOGGING: ${PALWORLD_PLAYER_LOGGING_ENABLED:-true}
      DISCORD_WEBHOOK_ENABLED: ${PALWORLD_DISCORD_WEBHOOK_ENABLED:-false}
      TARGET_MANIFEST_ID: ${PALWORLD_TARGET_MANIFEST_ID:-}
      UPDATE_ON_BOOT: ${PALWORLD_UPDATE_ON_BOOT:-true}
      AUTO_UPDATE_ENABLED: ${PALWORLD_AUTO_UPDATE_ENABLED:-true}
      AUTO_UPDATE_CRON_EXPRESSION: ${PALWORLD_AUTO_UPDATE_CRON:-0 4 * * *}
      AUTO_REBOOT_ENABLED: ${PALWORLD_AUTO_REBOOT_ENABLED:-true}
      AUTO_REBOOT_CRON_EXPRESSION: ${PALWORLD_AUTO_REBOOT_CRON:-0 5 * * *}
      BACKUP_ENABLED: ${PALWORLD_BACKUP_ENABLED:-true}
      BACKUP_CRON_EXPRESSION: ${PALWORLD_BACKUP_CRON:-0 * * * *}
      BACKUP_RETENTION_POLICY: "true"
      BACKUP_RETENTION_AMOUNT_TO_KEEP: ${PALWORLD_BACKUP_RETENTION:-72}
    volumes:
      - ./palworld-data:/palworld

  panel:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: palworld-admin-panel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PALWORLD_RCON_HOST: palworld
      PANEL_WEB_ROOT: /app/dist
      PANEL_STATE_DIR: /data/panel-state
      PANEL_DISPLAY_HOST: ${PANEL_DISPLAY_HOST:-}
      PANEL_RCON_TIMEOUT_MS: ${PANEL_RCON_TIMEOUT_MS:-1800}
      PALWORLD_DATA_DIR: /palworld
      PALWORLD_SAVES_DIR: /palworld/Pal/Saved/SaveGames
      PALWORLD_BACKUP_DIR: /palworld/backups
      PALWORLD_COMPOSE_DIR: /stack
      PALWORLD_COMPOSE_PROJECT: ${PALWORLD_COMPOSE_PROJECT:-palworld-server}
      PANEL_ENV_FILE: /stack/.env
    ports:
      - "127.0.0.1:${PANEL_API_PORT:-16824}:16824/tcp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./palworld-data:/palworld:rw
      - ./panel-state:/data/panel-state:rw
      - ./:/stack:ro
    depends_on:
      - palworld
