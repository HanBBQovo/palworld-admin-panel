services:
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    container_name: ${PALWORLD_CONTAINER:-palworld-server}
    restart: unless-stopped
    stop_grace_period: 120s
    env_file:
      - .env
    ports:
      - "${PALWORLD_PORT:-8211}:8211/udp"
      - "${PALWORLD_QUERY_PORT:-27015}:27015/udp"
      - "127.0.0.1:${PALWORLD_RCON_PORT:-25575}:25575/tcp"
      - "127.0.0.1:${PALWORLD_REST_PORT:-8212}:8212/tcp"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PORT: "8211"
      QUERY_PORT: "27015"
      PLAYERS: ${PLAYERS:-32}
      SERVER_PLAYER_MAX_NUM: ${SERVER_PLAYER_MAX_NUM:-32}
      SERVER_NAME: ${SERVER_NAME:-Palworld Dedicated Server}
      SERVER_DESCRIPTION: ${SERVER_DESCRIPTION:-Managed by Palworld Ops}
      SERVER_PASSWORD: ${SERVER_PASSWORD:-change-game-password}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-admin-password}
      COMMUNITY: ${COMMUNITY:-false}
      RCON_ENABLED: ${RCON_ENABLED:-true}
      RCON_PORT: "25575"
      REST_API_ENABLED: ${REST_API_ENABLED:-false}
      REST_API_PORT: "8212"
      EXP_RATE: ${EXP_RATE:-1}
      PAL_CAPTURE_RATE: ${PAL_CAPTURE_RATE:-1}
      PAL_SPAWN_NUM_RATE: ${PAL_SPAWN_NUM_RATE:-1}
      COLLECTION_DROP_RATE: ${COLLECTION_DROP_RATE:-1}
      ENEMY_DROP_ITEM_RATE: ${ENEMY_DROP_ITEM_RATE:-1}
      PAL_EGG_DEFAULT_HATCHING_TIME: ${PAL_EGG_DEFAULT_HATCHING_TIME:-72}
      AUTO_SAVE_SPAN: ${AUTO_SAVE_SPAN:-30}
      DEATH_PENALTY: ${DEATH_PENALTY:-All}
      BASE_CAMP_WORKER_MAX_NUM: ${BASE_CAMP_WORKER_MAX_NUM:-15}
      GUILD_PLAYER_MAX_NUM: ${GUILD_PLAYER_MAX_NUM:-20}
      BASE_CAMP_MAX_NUM_IN_GUILD: ${BASE_CAMP_MAX_NUM_IN_GUILD:-4}
      CROSSPLAY_PLATFORMS: ${CROSSPLAY_PLATFORMS:-(Steam,Xbox,PS5,Mac)}
      AUTO_PAUSE_ENABLED: ${AUTO_PAUSE_ENABLED:-false}
      ENABLE_PLAYER_LOGGING: ${ENABLE_PLAYER_LOGGING:-true}
      DISCORD_WEBHOOK_ENABLED: ${DISCORD_WEBHOOK_ENABLED:-false}
      TARGET_MANIFEST_ID: ${TARGET_MANIFEST_ID:-}
      UPDATE_ON_BOOT: ${UPDATE_ON_BOOT:-true}
      AUTO_UPDATE_ENABLED: ${AUTO_UPDATE_ENABLED:-true}
      AUTO_UPDATE_CRON_EXPRESSION: ${AUTO_UPDATE_CRON_EXPRESSION:-0 4 * * *}
      AUTO_REBOOT_ENABLED: ${AUTO_REBOOT_ENABLED:-true}
      AUTO_REBOOT_CRON_EXPRESSION: ${AUTO_REBOOT_CRON_EXPRESSION:-0 5 * * *}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_CRON_EXPRESSION: ${BACKUP_CRON_EXPRESSION:-0 * * * *}
      BACKUP_RETENTION_POLICY: "true"
      BACKUP_RETENTION_AMOUNT_TO_KEEP: ${BACKUP_RETENTION_AMOUNT_TO_KEEP:-72}
    volumes:
      - ./palworld-data:/palworld

  panel:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: palworld-admin-panel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PALWORLD_RCON_HOST: palworld
      PANEL_WEB_ROOT: /app/dist
      PANEL_STATE_DIR: /data/panel-state
      PANEL_DISPLAY_HOST: ${PANEL_DISPLAY_HOST:-}
      PANEL_RCON_TIMEOUT_MS: ${PANEL_RCON_TIMEOUT_MS:-1800}
      PALWORLD_DATA_DIR: /palworld
      PALWORLD_SAVES_DIR: /palworld/Pal/Saved/SaveGames
      PALWORLD_BACKUP_DIR: /palworld/backups
      PALWORLD_COMPOSE_DIR: /stack
      PALWORLD_COMPOSE_PROJECT: ${PALWORLD_COMPOSE_PROJECT:-palworld-server}
      PANEL_ENV_FILE: /stack/.env
      PALWORLD_REST_URL: http://127.0.0.1:8212
      PALWORLD_WORLD_INDEX_URL: http://127.0.0.1:16826
      PALWORLD_WORLD_SNAPSHOT_DIR: /advanced/world-snapshot
      PALWORLD_SAVE_EDITOR_DIR: /advanced/editor
      PALWORLD_SAVE_EDITOR_IMAGE: palworld-save-editor:v0.17.4
      PALWORLD_SAVE_EDITOR_WORKSPACE: /advanced/editor-workspace
      PALWORLD_ADVANCED_COMPOSE_FILE: /stack/docker-compose.advanced.yml
      PANEL_EDITOR_APPLY_ENABLED: "false"
    ports:
      - "127.0.0.1:${PANEL_API_PORT:-16824}:16824/tcp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ./palworld-data:/palworld:rw
      - ./panel-state:/data/panel-state:rw
      - ./advanced-state:/advanced:rw
      - ./:/stack:rw
    depends_on:
      - palworld
